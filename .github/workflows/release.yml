name: release-mac

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      ELECTRON_BUILDER_CACHE: .cache/electron-builder
      ELECTRON_CACHE: .cache/electron
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Code/package-lock.json

      - name: Install dependencies
        working-directory: Code
        run: npm ci

      - name: Verify
        working-directory: Code
        run: npm run check

      - name: Build macOS distributables
        working-directory: Code
        run: npm run dist:mac

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: leeos-macos-${{ github.ref_name }}
          if-no-files-found: error
          path: |
            Code/release/*.dmg
            Code/release/*.zip

      - name: Publish GitHub release assets
        run: |
          set -euo pipefail

          prerelease=false
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            prerelease=true
          fi

          api_root="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          release_response="$(mktemp)"

          release_status="$(
            curl -sS \
              -o "${release_response}" \
              -w '%{http_code}' \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              "${api_root}/releases/tags/${GITHUB_REF_NAME}"
          )"

          if [[ "${release_status}" != "200" ]]; then
            create_payload="$(
              jq -n \
                --arg tag "${GITHUB_REF_NAME}" \
                --arg name "${GITHUB_REF_NAME}" \
                --argjson prerelease "${prerelease}" \
                '{
                  tag_name: $tag,
                  name: $name,
                  generate_release_notes: true,
                  prerelease: $prerelease
                }'
            )"

            create_status="$(
              curl -sS \
                -o "${release_response}" \
                -w '%{http_code}' \
                -X POST \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H 'Accept: application/vnd.github+json' \
                -H 'Content-Type: application/json' \
                -d "${create_payload}" \
                "${api_root}/releases"
            )"

            if [[ "${create_status}" != "201" ]]; then
              cat "${release_response}"
              exit 1
            fi
          fi

          gh release upload "${GITHUB_REF_NAME}" \
            Code/release/*.dmg \
            Code/release/*.zip \
            --clobber
