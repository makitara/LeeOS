<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscription Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <section class="topbar">
        <div class="title-wrap">
          <h2 class="title">Subscription Cards</h2>
        </div>
        <div class="topbar-actions">
          <input id="searchInput" class="search" placeholder="Search subscriptions" />
          <button id="openDataDirBtn" class="data-dir-btn" type="button" title="Open data folder" aria-label="Open data folder">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7c0 1.7 3.6 3 8 3s8-1.3 8-3-3.6-3-8-3-8 1.3-8 3z"></path><path d="M4 7v5c0 1.7 3.6 3 8 3s8-1.3 8-3V7"></path><path d="M4 12v5c0 1.7 3.6 3 8 3s8-1.3 8-3v-5"></path></svg>
            <span>Data</span>
          </button>
          <button id="newSubBtn" class="new-sub-btn" title="New Subscription" aria-label="New Subscription">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
            <span>New</span>
          </button>
        </div>
      </section>

      <section class="workspace">
        <aside class="sidebar">
          <section class="side-top">
            <div class="brand">Categories</div>
            <div class="side-actions">
              <button id="openAddCategoryBtn" class="icon-btn" type="button" title="New Category" aria-label="New Category">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
              </button>
              <button id="editCategoriesBtn" class="side-edit-btn" type="button" aria-label="Edit categories">Edit</button>
            </div>
          </section>

          <section id="categoryList" class="cat-list"></section>
        </aside>

        <main class="main">
          <section id="board" class="board"></section>
        </main>
      </section>
      <div id="globalNotice" class="app-notice" role="status" aria-live="polite" hidden></div>
    </div>

    <dialog id="editor">
      <form id="editorForm" class="modal" novalidate>
        <div class="modal-head">
          <div class="modal-head-copy">
            <h3 id="editorTitle" style="margin:0">New Subscription</h3>
          </div>
          <div id="editorUtilityActions" class="modal-icon-actions" hidden>
            <button id="editorOpenUrlBtn" class="icon-btn modal-icon-btn" type="button" title="Open subscription URL" aria-label="Open subscription URL">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 5h5v5"></path><path d="M10 14L19 5"></path><path d="M19 13v5a1 1 0 0 1-1 1h-12a1 1 0 0 1-1-1v-12a1 1 0 0 1 1-1h5"></path></svg>
            </button>
            <button id="editorRenewBtn" class="icon-btn modal-icon-btn" type="button" title="Record renewal" aria-label="Record renewal">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="6" width="18" height="12" rx="3"></rect><path d="M3 10h18"></path><path d="M15.5 13.5h5"></path><path d="M18 11v5"></path></svg>
            </button>
          </div>
        </div>
        <div class="form">
          <label><span>Name<em class="required-mark">*</em></span><input id="fName" required maxlength="80" /></label>
          <label><span>URL</span><input id="fUrl" maxlength="220" placeholder="https://..." /></label>
          <label><span>Default price</span><input id="fPrice" type="number" min="0" step="0.01" placeholder="Optional" /></label>
          <label><span>Currency</span><input id="fCurrency" maxlength="8" value="CNY" /></label>
          <label><span>Category</span><select id="fCategory"></select></label>
          <label><span>Status</span>
            <select id="fStatus">
              <option value="active">active</option>
              <option value="cancelled">cancelled</option>
            </select>
          </label>
          <label><span>Start date</span><input id="fStartDate" type="date" /></label>
          <label><span>End date</span><input id="fEndDate" type="date" /></label>
          <div class="full">
            <span class="field-label">Icon</span>
            <div class="icon-field">
              <div id="iconPreview" class="icon-preview" aria-hidden="true"></div>
              <div>
                <div class="icon-controls">
                  <button id="chooseIconBtn" class="icon-pick-btn" type="button">Upload</button>
                  <button id="clearIconBtn" class="icon-reset-btn" type="button">Clear</button>
                </div>
                <div class="icon-status">
                  <small id="iconHelp" class="field-help"></small>
                  <small class="field-help field-help-hint">Supports png/jpeg/webp/gif/ico, max 2MB</small>
                </div>
              </div>
            </div>
          </div>
          <input id="fIconUpload" class="icon-upload-input" type="file" accept="image/png,image/jpeg,image/webp,image/gif,image/x-icon,image/vnd.microsoft.icon" />
          <label class="full"><span>Note</span><textarea id="fNote" maxlength="300"></textarea></label>
          <section id="editorRenewalSection" class="renewal-history full" hidden>
            <div class="renewal-history__head">
              <span class="field-label">Renewal history</span>
            </div>
            <div id="editorRenewalEmpty" class="renewal-history__empty" hidden>No renewals recorded yet.</div>
            <div id="editorRenewalList" class="renewal-history__list"></div>
          </section>
        </div>
        <p id="editorError" class="form-error" hidden></p>
        <div class="modal-actions">
          <button type="button" id="deleteSubBtn" class="modal-danger" hidden>Delete</button>
          <button type="button" id="cancelBtn">Cancel</button>
          <button type="button" id="editorSaveBtn" class="modal-save">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="categoryCreator">
      <form id="categoryCreatorForm" class="modal" novalidate>
        <h3 style="margin:0">New Category</h3>
        <label class="full"><span>Name<em class="required-mark">*</em></span><input id="fNewCategoryName" maxlength="30" required autofocus /></label>
        <p id="categoryCreatorError" class="form-error" hidden></p>
        <div class="modal-actions">
          <button type="button" id="cancelCategoryBtn">Cancel</button>
          <button type="button" id="createCategoryBtn" class="modal-save">Create</button>
        </div>
      </form>
    </dialog>

    <dialog id="renewalEditor">
      <form id="renewalEditorForm" class="modal" novalidate>
        <h3 id="renewalEditorTitle" style="margin:0">Renew Subscription</h3>
        <p id="renewalEditorContext" class="renewal-context"></p>
        <div class="form">
          <label><span>Paid amount<em class="required-mark">*</em></span><input id="fRenewalAmount" type="number" min="0" step="0.01" required /></label>
          <label><span>Currency</span><input id="fRenewalCurrency" maxlength="8" value="CNY" /></label>
          <label><span>Paid at</span><input id="fRenewalPaidAt" type="date" /></label>
          <label><span>Start date<em class="required-mark">*</em></span><input id="fRenewalStartDate" type="date" required /></label>
          <label><span>End date<em class="required-mark">*</em></span><input id="fRenewalEndDate" type="date" required /></label>
        </div>
        <p id="renewalEditorError" class="form-error" hidden></p>
        <div class="modal-actions">
          <button type="button" id="cancelRenewalBtn">Cancel</button>
          <button type="button" id="renewalSaveBtn" class="modal-save">Save Renewal</button>
        </div>
      </form>
    </dialog>
    <script src="./constants.js"></script>
    <script src="./storage.js"></script>
    <script src="./events.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
