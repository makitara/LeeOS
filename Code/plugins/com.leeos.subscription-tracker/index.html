<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscription Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <section class="topbar">
        <div class="title-wrap">
          <h2 class="title">Subscription Cards</h2>
        </div>
        <div class="topbar-actions">
          <input id="searchInput" class="search" placeholder="Search subscriptions" />
          <button id="openDataDirBtn" class="data-dir-btn" type="button" title="Open data folder" aria-label="Open data folder">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7.5h6l2 2h10v7.5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><path d="M3 7.5a2 2 0 0 1 2-2h4"></path></svg>
            <span>Data</span>
          </button>
          <button id="newSubBtn" class="new-sub-btn" title="New Subscription" aria-label="New Subscription">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
            <span>New</span>
          </button>
        </div>
      </section>

      <section class="workspace">
        <aside class="sidebar">
          <section class="side-top">
            <div class="brand">Categories</div>
            <div class="side-actions">
              <button id="openAddCategoryBtn" class="icon-btn" type="button" title="New Category" aria-label="New Category">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
              </button>
              <button id="editCategoriesBtn" class="side-edit-btn" type="button" aria-label="Edit categories">Edit</button>
            </div>
          </section>

          <section id="categoryList" class="cat-list"></section>
        </aside>

        <main class="main">
          <section id="board" class="board"></section>
        </main>
      </section>
      <div id="globalNotice" class="app-notice" role="status" aria-live="polite" hidden></div>
    </div>

    <dialog id="editor">
      <form id="editorForm" class="modal" novalidate>
        <h3 id="editorTitle" style="margin:0">New Subscription</h3>
        <div class="form">
          <label><span>Name<em class="required-mark">*</em></span><input id="fName" required maxlength="80" /></label>
          <label><span>URL</span><input id="fUrl" maxlength="220" placeholder="https://..." /></label>
          <label><span>Price</span><input id="fPrice" type="number" min="0" step="0.01" placeholder="Optional" /></label>
          <label><span>Currency</span><input id="fCurrency" maxlength="8" value="CNY" /></label>
          <label><span>Category</span><select id="fCategory"></select></label>
          <label><span>Status</span>
            <select id="fStatus">
              <option value="active">active</option>
              <option value="cancelled">cancelled</option>
            </select>
          </label>
          <label><span>Cycle</span>
            <select id="fCycle">
              <option value="monthly">monthly</option>
              <option value="yearly">yearly</option>
              <option value="custom_days">custom_days</option>
            </select>
          </label>
          <label id="customDaysWrap" style="display:none"><span>Custom days</span><input id="fCustomDays" type="number" min="1" step="1" value="30" /></label>
          <label><span>Next billing</span><input id="fNextDate" type="date" /></label>
          <div class="full">
            <span class="field-label">Icon</span>
            <div class="icon-field">
              <div id="iconPreview" class="icon-preview" aria-hidden="true"></div>
              <div>
                <div class="icon-controls">
                  <button id="chooseIconBtn" class="icon-pick-btn" type="button">Upload</button>
                  <button id="clearIconBtn" class="icon-reset-btn" type="button">Clear</button>
                </div>
                <div class="icon-status">
                  <small id="iconHelp" class="field-help"></small>
                  <small class="field-help field-help-hint">Supports png/jpeg/webp/gif/ico, max 2MB</small>
                </div>
              </div>
            </div>
          </div>
          <input id="fIconUpload" class="icon-upload-input" type="file" accept="image/png,image/jpeg,image/webp,image/gif,image/x-icon,image/vnd.microsoft.icon" />
          <label class="full"><span>Note</span><textarea id="fNote" maxlength="300"></textarea></label>
        </div>
        <p id="editorError" class="form-error" hidden></p>
        <div class="modal-actions">
          <button type="button" id="deleteSubBtn" class="modal-danger" hidden>Delete</button>
          <button type="button" id="cancelBtn">Cancel</button>
          <button type="button" id="editorSaveBtn" class="modal-save">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="categoryCreator">
      <form id="categoryCreatorForm" class="modal" novalidate>
        <h3 style="margin:0">New Category</h3>
        <label class="full"><span>Name<em class="required-mark">*</em></span><input id="fNewCategoryName" maxlength="30" required autofocus /></label>
        <p id="categoryCreatorError" class="form-error" hidden></p>
        <div class="modal-actions">
          <button type="button" id="cancelCategoryBtn">Cancel</button>
          <button type="button" id="createCategoryBtn" class="modal-save">Create</button>
        </div>
      </form>
    </dialog>
    <script src="./constants.js"></script>
    <script src="./storage.js"></script>
    <script src="./events.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
